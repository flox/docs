schema-version = "1.12.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
nodejs.pkg-path = "nodejs"
vale.pkg-path = "vale"
pandoc.pkg-path = "pandoc"
# gum.pkg-path = "gum"
# gum.version = "^0.14.5"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = '''
  install_mint() {
    local mint_bin="$FLOX_ENV_CACHE/npm/bin/mint"
    if [ ! -x "$mint_bin" ]; then
      NPM_CONFIG_PREFIX="$FLOX_ENV_CACHE/npm" npm install -g mint --silent
    fi
  }

  install_mint
  export NPM_CONFIG_PREFIX="$FLOX_ENV_CACHE/npm"
  export PATH="$FLOX_ENV_CACHE/npm/bin:$PATH"
  cd "$FLOX_ENV_PROJECT"

  echo ""
  echo "  mint dev            Preview docs locally at http://localhost:3000"
  echo "  mint broken-links   Check for broken links across all pages"
  echo "  mint update         Update the Mintlify CLI (stays within this environment)"
  echo "  vale <file>         Spell-check an .mdx file against the project's Vale config"
  echo ""
'''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
common = '''
  export NPM_CONFIG_PREFIX="$FLOX_ENV_CACHE/npm"
  export PATH="$FLOX_ENV_CACHE/npm/bin:$PATH"
'''


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
# myservice.command = "python3 -m http.server"


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


