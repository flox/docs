    "hook": {
      "on-activate": "  install_mint() {\n    local mint_bin=\"$FLOX_ENV_CACHE/npm/bin/mint\"\n    if [ ! -x \"$mint_bin\" ]; then\n      NPM_CONFIG_PREFIX=\"$FLOX_ENV_CACHE/npm\" npm install -g mint --silent\n    fi\n  }\n\n  install_mint\n  export NPM_CONFIG_PREFIX=\"$FLOX_ENV_CACHE/npm\"\n  export PATH=\"$FLOX_ENV_CACHE/npm/bin:$PATH\"\n  cd \"$FLOX_ENV_PROJECT\"\n\n  echo \"\"\n  echo \"  mint dev            Preview docs locally at http://localhost:3000\"\n  echo \"  mint broken-links   Check for broken links across all pages\"\n  echo \"  mint update         Update the Mintlify CLI (stays within this environment)\"\n  echo \"  vale <file>         Spell-check an .mdx file against the project's Vale config\"\n  echo \"\"\n"
    },
    "profile": {
      "common": "  export NPM_CONFIG_PREFIX=\"$FLOX_ENV_CACHE/npm\"\n  export PATH=\"$FLOX_ENV_CACHE/npm/bin:$PATH\"\n"
    },
